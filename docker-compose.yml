version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: llm_dpeci_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: llm_dpeci_db
      MYSQL_USER: dpeci_user
      MYSQL_PASSWORD: dpeci_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: llm_dpeci_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    env_file:
      - .env

  frontend:
    build: ./frontend
    container_name: llm_dpeci_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data: